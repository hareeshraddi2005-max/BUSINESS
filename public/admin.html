<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVNT - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-indigo-700 text-white px-8 py-4 flex items-center justify-between shadow-lg">
    <span class="text-2xl font-black tracking-wide">INVNT</span>
    <div class="flex gap-6 text-sm font-semibold">
      <a href="dashboard.html" class="hover:text-indigo-200">Dashboard</a>
      <a href="products.html" class="hover:text-indigo-200">Products</a>
      <a href="sales.html" class="hover:text-indigo-200">Sales</a>
      <a href="admin.html" class="hover:text-indigo-200 border-b-2 border-white pb-1">Admin</a>
    </div>
    <div class="flex items-center gap-4">
      <span id="userBadge" class="bg-indigo-500 px-3 py-1 rounded-full text-xs"></span>
      <button onclick="logout()" class="bg-white text-indigo-700 font-bold px-4 py-1 rounded-lg hover:bg-indigo-100 transition text-sm">Logout</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 py-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Admin Panel - User Management</h2>

    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-purple-50 text-purple-700 font-bold">
          <tr>
            <th class="p-4 text-left">Username</th>
            <th class="p-4 text-left">Role</th>
            <th class="p-4 text-left">Created</th>
            <th class="p-4 text-left">Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
