<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVNT - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-indigo-700 text-white px-8 py-4 flex items-center justify-between shadow-lg">
    <span class="text-2xl font-black tracking-wide">INVNT</span>
    <div class="flex gap-6 text-sm font-semibold">
      <a href="dashboard.html" class="hover:text-indigo-200 border-b-2 border-white pb-1">Dashboard</a>
      <a href="products.html" class="hover:text-indigo-200">Products</a>
      <a href="sales.html" class="hover:text-indigo-200">Sales</a>
      <a href="admin.html" id="adminLink" class="hover:text-indigo-200 hidden">Admin</a>
    </div>
    <div class="flex items-center gap-4">
      <span id="userBadge" class="bg-indigo-500 px-3 py-1 rounded-full text-xs"></span>
      <button onclick="logout()" class="bg-white text-indigo-700 font-bold px-4 py-1 rounded-lg hover:bg-indigo-100 transition text-sm">Logout</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Overview</h2>

    <!-- STAT CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-white rounded-xl shadow p-6 border-l-4 border-indigo-500">
        <p class="text-gray-500 text-sm">Total Products</p>
        <p id="totalProducts" class="text-4xl font-black text-indigo-700 mt-1">-</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6 border-l-4 border-green-500">
        <p class="text-gray-500 text-sm">Total Sales</p>
        <p id="totalSales" class="text-4xl font-black text-green-600 mt-1">-</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6 border-l-4 border-yellow-500">
        <p class="text-gray-500 text-sm">Total Revenue</p>
        <p id="revenue" class="text-4xl font-black text-yellow-600 mt-1">-</p>
      </div>
      <div class="bg-white rounded-xl shadow p-6 border-l-4 border-red-500">
        <p class="text-gray-500 text-sm">Low Stock Alerts</p>
        <p id="lowStockCount" class="text-4xl font-black text-red-600 mt-1">-</p>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-bold text-gray-700 mb-4">Revenue - Last 7 Days</h3>
        <canvas id="revenueChart" height="120"></canvas>
      </div>
      <div class="bg-white rounded-xl shadow p-6">
        <h3 class="font-bold text-gray-700 mb-4">Top Selling Products</h3>
        <canvas id="productChart" height="120"></canvas>
      </div>
    </div>

    <!-- LOW STOCK ALERTS -->
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
        <span class="text-red-500">&#9888;</span> Low Stock Alerts
      </h3>
      <div id="lowStockList" class="space-y-2"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
