<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INVNT - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-indigo-800 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-10">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-black text-indigo-700">INVNT</h1>
      <p class="text-gray-500 mt-1">Business Inventory Manager</p>
    </div>

    <div id="loginForm">
      <input id="username" placeholder="Username" class="border border-gray-300 rounded-lg p-3 w-full mb-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
      <input id="password" type="password" placeholder="Password" class="border border-gray-300 rounded-lg p-3 w-full mb-5 focus:outline-none focus:ring-2 focus:ring-indigo-400">
      <button onclick="login()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold w-full py-3 rounded-lg transition">Login</button>
      <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden"></p>
      <p class="text-center mt-5 text-gray-500">No account? <a href="signup.html" class="text-indigo-600 font-semibold hover:underline">Sign Up</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
